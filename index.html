<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TI-84 Style Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="calculator-shell">
      <header class="header">
        <div>
          <p class="brand">TI-84 Plus</p>
          <h1>Graphing Calculator</h1>
        </div>
        <span class="badge">Simple Edition</span>
      </header>

      <section class="display-panel" aria-label="Calculator display">
        <div class="display-label">Screen</div>
        <div id="display" class="display" aria-live="polite">0</div>
      </section>

      <section class="controls" aria-label="Calculator buttons">
        <div class="button-row compact">
          <button class="btn memory" data-action="memory" data-value="clear">MC</button>
          <button class="btn memory" data-action="memory" data-value="recall">MR</button>
          <button class="btn memory" data-action="memory" data-value="add">M+</button>
          <button class="btn memory" data-action="memory" data-value="subtract">M-</button>
        </div>

        <div class="button-row">
          <button class="btn function" data-action="clear">AC</button>
          <button class="btn function" data-action="backspace">⌫</button>
          <button class="btn operator" data-action="operator" data-value="/">÷</button>
          <button class="btn operator" data-action="operator" data-value="*">×</button>
        </div>

        <div class="button-row">
          <button class="btn number" data-action="number" data-value="7">7</button>
          <button class="btn number" data-action="number" data-value="8">8</button>
          <button class="btn number" data-action="number" data-value="9">9</button>
          <button class="btn operator" data-action="operator" data-value="-">−</button>
        </div>

        <div class="button-row">
          <button class="btn number" data-action="number" data-value="4">4</button>
          <button class="btn number" data-action="number" data-value="5">5</button>
          <button class="btn number" data-action="number" data-value="6">6</button>
          <button class="btn operator" data-action="operator" data-value="+">+</button>
        </div>

        <div class="button-row">
          <button class="btn number" data-action="number" data-value="1">1</button>
          <button class="btn number" data-action="number" data-value="2">2</button>
          <button class="btn number" data-action="number" data-value="3">3</button>
          <button class="btn equals" data-action="equals">=</button>
        </div>

        <div class="button-row footer-row">
          <button class="btn number zero" data-action="number" data-value="0">0</button>
          <button class="btn number" data-action="decimal">.</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
